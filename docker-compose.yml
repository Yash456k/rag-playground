name: rag-playground

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-playground-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - rag_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    mem_limit: 384m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-playground-api:local
    container_name: rag-playground-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ACTIVITY_CACHE_PATH: /activity/activity.json
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:8000"
    volumes:
      - model_cache:/models
      - ./model-artifacts:/model-artifacts:ro
      - ${ACTIVITY_DATA_DIR:-./var/activity}:/activity:ro
    networks:
      - rag_internal
    mem_limit: 3500m
    cpus: 2.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  proxy:
    image: caddy:2.10-alpine
    container_name: rag-playground-proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN}
      PUBLIC_IPV4: ${PUBLIC_IPV4}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "${PUBLIC_IPV4}:80:80"
      - "${PUBLIC_IPV4}:443:443"
      - "${PUBLIC_IPV4}:443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rag_internal
    mem_limit: 96m
    cpus: 0.2
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  rag_internal:
    name: rag-playground-internal

volumes:
  pg_data:
    name: rag-playground-pg-data
  model_cache:
    name: rag-playground-model-cache
  caddy_data:
    name: rag-playground-caddy-data
  caddy_config:
    name: rag-playground-caddy-config
